name: BTC Page Narrowing Repair

on:
  push:
    branches:
      - agent/btc-personal-field-market-envelope-v0-1
    paths:
      - .github/workflows/btc-page-narrowing-repair.yml

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/btc-personal-field-market-envelope-v0-1
          fetch-depth: 0
      - name: Apply exact discriminant narrowing and remove repair workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('pages/crypto-astro/btc.tsx')
          text = path.read_text()
          replacements = {
              'if(!source.ok)return': 'if(source.ok===false)return',
              'if(!composed.ok)return': 'if(composed.ok===false)return',
              'envelope:market.ok?market.value:null,envelopeFailure:market.ok?null:': 'envelope:market.ok===true?market.value:null,envelopeFailure:market.ok===true?null:',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'exact replacement count for {old!r}: {count}')
              text = text.replace(old, new)
          path.write_text(text)
          PY
          git rm .github/workflows/btc-page-narrowing-repair.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pages/crypto-astro/btc.tsx
          git commit -m "Fix BTC page discriminant narrowing"
          git push origin HEAD:agent/btc-personal-field-market-envelope-v0-1
