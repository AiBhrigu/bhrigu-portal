name: BTC Envelope Golden Rail Rescue

on:
  pull_request:
    types: [reopened]
    branches: [master]
    paths:
      - pages/crypto-astro/btc.tsx
      - .github/workflows/btc-envelope-golden-rail-rescue.yml

permissions:
  contents: write

env:
  BRANCH: agent/btc-personal-field-market-envelope-v0-1

jobs:
  rescue:
    if: github.event.pull_request.head.ref == 'agent/btc-personal-field-market-envelope-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/btc-personal-field-market-envelope-v0-1
          fetch-depth: 0
      - name: Apply geometry repair across both CSS scopes and remove workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('pages/crypto-astro/btc.tsx')
          text = path.read_text()
          replacements = 0
          pairs = [
            ('.btc{min-height:220px;display:grid;place-content:center;text-align:center;', '.btc{align-self:start;min-height:360px;display:grid;place-content:center;text-align:center;'),
            ('.nodes{display:grid;grid-template-columns:1fr 1fr;gap:8px}', '.nodes{display:grid;grid-template-columns:1fr;gap:8px}'),
            ('.btc{min-height:170px}.envelope{padding:18px 13px}.nodes{grid-template-columns:1fr 1fr}', '.btc{min-height:170px}.envelope{padding:18px 13px}.nodes{grid-template-columns:1fr}'),
          ]
          for old,new in pairs:
            count=text.count(old)
            if count not in (1,2):
              raise SystemExit(f'unexpected synchronized replacement count for {old!r}: {count}')
            text=text.replace(old,new)
            replacements += count
          if replacements < 4:
            raise SystemExit(f'expected synchronized geometry repair, got {replacements} replacements')
          path.write_text(text)
          PY
          git rm .github/workflows/btc-envelope-golden-rail-rescue.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pages/crypto-astro/btc.tsx
          git commit -m "Lock BTC golden anchor and module rail geometry"
          git push origin HEAD:${BRANCH}
