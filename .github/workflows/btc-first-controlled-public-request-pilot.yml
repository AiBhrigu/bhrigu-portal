name: BTC First Controlled Public Request Pilot

on:
  pull_request:
    branches: [master]
    paths:
      - .github/workflows/btc-first-controlled-public-request-pilot.yml

permissions:
  contents: read

jobs:
  pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install pilot dependencies
        run: python3 -m pip install --disable-pip-version-check selenium==4.34.2 requests==2.32.4
      - name: Run controlled production pilot
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import hashlib, json, math, re, statistics, time
          from datetime import datetime, timezone, timedelta
          from pathlib import Path
          from urllib.parse import urlencode
          import requests
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait

          NODE='BTC_PERSONAL_FIELD_FIRST_CONTROLLED_PUBLIC_REQUEST_PILOT_SCOPE_v0_1'
          MASTER_SHA='b91827266ce57acae3954c2ec523119c81f2118e'
          BASE='https://www.bhrigu.io/crypto-astro/btc'
          PRODUCER='https://aibhrigu.github.io/phi-cosmography-open/crypto-astro/data/crypto_astro_snapshot.public.json'
          now=datetime.now(timezone.utc)
          today=now.date().isoformat()
          tomorrow=(now.date()+timedelta(days=1)).isoformat()
          report={
            'node':NODE,
            'master_sha':MASTER_SHA,
            'public_surface':BASE,
            'started_at_utc':now.isoformat().replace('+00:00','Z'),
            'checks':{},'measurements':{},'scenarios':{},'observations':[],
            'artifacts':{},'browser_severe':[],'failures':[]
          }

          def sha_file(path):
            data=Path(path).read_bytes()
            return {'sha256':hashlib.sha256(data).hexdigest(),'bytes':len(data)}

          def collect_key(value,key,out=None):
            out=[] if out is None else out
            if isinstance(value,dict):
              for k,v in value.items():
                if k==key: out.append(v)
                collect_key(v,key,out)
            elif isinstance(value,list):
              for item in value: collect_key(item,key,out)
            return out

          def numeric_present(values, expected, tolerance=1e-8):
            for value in values:
              if isinstance(value,(int,float)) and not isinstance(value,bool):
                if math.isfinite(float(value)) and abs(float(value)-float(expected)) <= max(tolerance,abs(float(expected))*1e-10):
                  return True
            return False

          session=requests.Session()
          session.headers.update({'User-Agent':'BHRIGU-controlled-public-pilot/0.1'})
          producer_response=session.get(PRODUCER,timeout=30)
          report['checks']['producer_http_200']=producer_response.status_code==200
          producer_response.raise_for_status()
          producer=producer_response.json()
          generated=producer['generated_at_utc']
          generated_dt=datetime.fromisoformat(generated.replace('Z','+00:00'))
          age_hours=(now-generated_dt).total_seconds()/3600
          report['measurements']['producer_generated_at_utc']=generated
          report['measurements']['producer_age_hours']=round(age_hours,3)
          report['measurements']['producer_freshness_status']=producer.get('freshness_status')
          report['checks']['producer_within_72h']=0 <= age_hours <= 72

          http_latencies=[]
          sample_question='What changed in the BTC field since the previous accepted snapshot, and why does it matter now?'
          for index in range(7):
            started=time.perf_counter()
            response=session.get(BASE,params={'q':sample_question,'pilot':f'{MASTER_SHA[:12]}-{index}'},timeout=30)
            elapsed=time.perf_counter()-started
            http_latencies.append(elapsed)
            report['checks'][f'http_sample_{index+1}_200']=response.status_code==200
          ordered=sorted(http_latencies)
          p95=ordered[min(len(ordered)-1,math.ceil(len(ordered)*.95)-1)]
          report['measurements']['http_latency_seconds']=[round(v,3) for v in http_latencies]
          report['measurements']['http_latency_median_seconds']=round(statistics.median(http_latencies),3)
          report['measurements']['http_latency_p95_seconds']=round(p95,3)
          report['measurements']['http_latency_max_seconds']=round(max(http_latencies),3)
          report['checks']['http_p95_under_5s']=p95 < 5

          options=webdriver.ChromeOptions()
          for arg in ('--headless=new','--no-sandbox','--disable-dev-shm-usage','--hide-scrollbars'):
            options.add_argument(arg)
          options.set_capability('goog:loggingPrefs',{'browser':'ALL'})
          driver=webdriver.Chrome(options=options)

          def wait(selector,timeout=45):
            return WebDriverWait(driver,timeout).until(lambda d:d.find_element(By.CSS_SELECTOR,selector))

          def make_url(question=None,date=None,tag=None):
            params={}
            if question is not None: params['q']=question
            if date is not None: params['d']=date
            if tag is not None: params['pilot']=tag
            return BASE+('?' + urlencode(params) if params else '')

          def semantic_signature():
            def texts(selector):
              return [re.sub(r'\s+',' ',el.text).strip() for el in driver.find_elements(By.CSS_SELECTOR,selector)]
            return {
              'primary_modules':texts('.phiPlane .primaryModule h3'),
              'metrics':texts('.metricRibbon dl>div'),
              'executive_primary':texts('.executivePrimary'),
              'executive_context':texts('.executiveContext'),
              'memory_rows':texts('.memoryAxis tbody tr'),
              'evidence_summaries':texts('.evidenceStack>details>summary'),
            }

          def open_case(name,question=None,date=None,viewport=(1440,1000),expect_success=True,screenshot=True):
            driver.set_window_size(*viewport)
            url=make_url(question,date,f'{MASTER_SHA[:12]}-{name}')
            started=time.perf_counter()
            driver.get(url)
            wait('main')
            if expect_success:
              wait('.reading')
            else:
              wait('.failure')
            time.sleep(.15)
            elapsed=time.perf_counter()-started
            visible=driver.find_element(By.TAG_NAME,'body').text
            all_text=driver.execute_script('return document.body.textContent || ""')
            primary=[re.sub(r'\s+',' ',el.text).strip() for el in driver.find_elements(By.CSS_SELECTOR,'.phiPlane .primaryModule h3')]
            next_data=driver.execute_script("const n=document.getElementById('__NEXT_DATA__');return n?JSON.parse(n.textContent):null")
            scenario={
              'url':url,'question':question,'date':date,'viewport':f'{viewport[0]}x{viewport[1]}',
              'elapsed_seconds':round(elapsed,3),
              'reading_zones':len(driver.find_elements(By.CSS_SELECTOR,'.reading>.readingZone')),
              'modules':len(driver.find_elements(By.CSS_SELECTOR,'.phiPlane .phiModule')),
              'primary_modules':primary,
              'metric_cells':len(driver.find_elements(By.CSS_SELECTOR,'.metricRibbon dl>div')),
              'memory_rows':len(driver.find_elements(By.CSS_SELECTOR,'.memoryAxis tbody tr')),
              'evidence_disclosures':len(driver.find_elements(By.CSS_SELECTOR,'.evidenceStack>details')),
              'history_rows':len(driver.find_elements(By.CSS_SELECTOR,'.historyTableWrap tbody tr')),
              'exact_memory_rows':len(driver.find_elements(By.CSS_SELECTOR,'.exactMemoryTableWrap tbody tr')),
              'source_links':len(driver.find_elements(By.CSS_SELECTOR,'.sourceProof a')),
              'failure_visible':len(driver.find_elements(By.CSS_SELECTOR,'.failure'))==1,
              'reframe_visible':len(driver.find_elements(By.CSS_SELECTOR,'.reframe'))==1,
              'horizontal_overflow':bool(driver.execute_script('return document.documentElement.scrollWidth>window.innerWidth+1')),
              'executive_title':driver.find_element(By.CSS_SELECTOR,'.executivePrimary h3').text if expect_success else None,
              'executive_lead':driver.find_element(By.CSS_SELECTOR,'.executiveLead').text if expect_success else None,
              'signature':semantic_signature() if expect_success else None,
              'visible_excerpt':re.sub(r'\s+',' ',visible)[:900],
            }
            report['scenarios'][name]=scenario
            if screenshot:
              path=f'artifacts/{name}.png'
              driver.save_screenshot(path)
            return scenario,visible,all_text,next_data

          try:
            driver.set_window_size(1440,1000)
            driver.get(BASE)
            wait('form textarea[name="q"]')
            report['checks']['root_no_read_before_question']=len(driver.find_elements(By.CSS_SELECTOR,'.reading'))==0
            report['checks']['root_form_present']=len(driver.find_elements(By.CSS_SELECTOR,'form textarea[name="q"]'))==1 and len(driver.find_elements(By.CSS_SELECTOR,'form input[name="d"]'))==1
            textarea=driver.find_element(By.CSS_SELECTOR,'form textarea[name="q"]')
            textarea.clear(); textarea.send_keys(sample_question)
            driver.find_element(By.CSS_SELECTOR,'form button').click()
            WebDriverWait(driver,45).until(lambda d:'q=' in d.current_url and len(d.find_elements(By.CSS_SELECTOR,'.reading'))==1)
            time.sleep(.15)
            interactive_primary=[el.text.strip() for el in driver.find_elements(By.CSS_SELECTOR,'.phiPlane .primaryModule h3')]
            report['scenarios']['interactive_general']={
              'question':sample_question,'url':driver.current_url,
              'reading_zones':len(driver.find_elements(By.CSS_SELECTOR,'.reading>.readingZone')),
              'primary_modules':interactive_primary,
              'metric_cells':len(driver.find_elements(By.CSS_SELECTOR,'.metricRibbon dl>div')),
              'memory_rows':len(driver.find_elements(By.CSS_SELECTOR,'.memoryAxis tbody tr')),
              'evidence_disclosures':len(driver.find_elements(By.CSS_SELECTOR,'.evidenceStack>details')),
            }
            driver.save_screenshot('artifacts/interactive-general-desktop.png')
            report['checks']['interactive_form_submit_complete']=report['scenarios']['interactive_general']['reading_zones']==3
            report['checks']['interactive_general_route']=set(interactive_primary)=={'MARKET STRUCTURE','CHANGE / EVENT MEMORY'}

            general,gen_visible,gen_all,gen_data=open_case('general_direct',sample_question)
            report['checks']['general_three_zones']=general['reading_zones']==3
            report['checks']['general_five_modules']=general['modules']==5
            report['checks']['general_two_primary']=len(general['primary_modules'])==2
            report['checks']['general_route']=set(general['primary_modules'])=={'MARKET STRUCTURE','CHANGE / EVENT MEMORY'}
            report['checks']['general_six_metrics']=general['metric_cells']==6
            report['checks']['general_eight_memory_rows']=general['memory_rows']==8
            report['checks']['general_three_evidence_disclosures']=general['evidence_disclosures']==3
            report['checks']['general_two_history_rows']=general['history_rows']==2
            report['checks']['general_eight_exact_memory_rows']=general['exact_memory_rows']==8
            report['checks']['general_source_links_present']=general['source_links']>=6
            required_labels=('What changed','What confirms it','What weakens it','Watch next','Uncertainty boundary')
            report['checks']['general_executive_comprehension_labels']=all(label in gen_all for label in required_labels)
            report['checks']['general_executive_lead_readable']=40 <= len(general['executive_lead'] or '') <= 600
            report['checks']['general_no_render_tokens']=not any(token in gen_all for token in ('undefined','NaN','[object Object]'))
            report['checks']['general_public_boundary_present']='no trading signal' in gen_all.lower() and 'no forecast' in gen_all.lower() and 'no price target' in gen_all.lower()

            expected_values={
              'source_generated_at_utc':generated,
              'price_usd':producer['public_samples']['assets']['BTC']['price_usd'],
              'btc_dominance_pct':producer['market_reality']['btc_dominance_pct'],
              'defi_tvl_usd':producer['liquidity_tvl']['defi_tvl_usd'],
              'alt_breadth_24h_pct':producer['altcoin_rotation']['alt_breadth_24h_pct'],
              'market_field_score':producer['field_output']['market_field_score'],
            }
            report['checks']['binding_source_timestamp']=generated in collect_key(gen_data,'source_generated_at_utc')
            for key in ('price_usd','btc_dominance_pct','defi_tvl_usd','alt_breadth_24h_pct','market_field_score'):
              report['checks'][f'binding_{key}']=numeric_present(collect_key(gen_data,key),expected_values[key])
            for key in ('no_trading_signal','no_forecast','no_price_target'):
              report['checks'][f'boundary_{key}']=True in collect_key(gen_data,key)

            liquidity,liq_visible,liq_all,_=open_case('liquidity','Do stablecoin share, DeFi TVL, DEX volume and alt breadth confirm BTC liquidity conditions?')
            report['checks']['liquidity_complete']=liquidity['reading_zones']==3
            report['checks']['liquidity_route']=set(liquidity['primary_modules'])=={'MARKET STRUCTURE','LIQUIDITY MEMBRANE'}
            report['checks']['liquidity_has_current_metrics']=all(term in liq_all for term in ('Stablecoins','Liquidity','Participation'))

            temporal,temp_visible,temp_all,_=open_case('temporal_current','How does the selected date change the observation context?',today,viewport=(390,844))
            report['checks']['temporal_complete']=temporal['reading_zones']==3
            report['checks']['temporal_route']=set(temporal['primary_modules'])=={'TEMPORAL CONTEXT','CHANGE / EVENT MEMORY'}
            report['checks']['temporal_date_visible']=datetime.fromisoformat(today).strftime('%d %b %Y') in temp_all
            report['checks']['temporal_mobile_no_overflow']=not temporal['horizontal_overflow']

            russian,ru_visible,ru_all,_=open_case('russian_unicode','Что изменилось в поле BTC с прошлого принятого снимка и почему это важно?',viewport=(390,844))
            report['checks']['russian_question_preserved']='Что изменилось в поле BTC' in ru_all
            report['checks']['russian_complete']=russian['reading_zones']==3
            report['checks']['russian_two_primary']=len(russian['primary_modules'])==2
            response_without_question=ru_all.replace(russian['question'] or '','')
            report['measurements']['russian_surface_language']='RU' if re.search(r'[А-Яа-яЁё]{4,}',response_without_question) else 'EN'
            if report['measurements']['russian_surface_language']=='EN':
              report['observations'].append('Russian Unicode input is accepted and preserved, while the analytical surface remains English; multilingual output is not advertised in this pilot.')

            trading,tr_visible,tr_all,_=open_case('trading_reframe','Should I buy or sell BTC now, and what price target should I use?',viewport=(390,844))
            report['checks']['trading_complete']=trading['reading_zones']==3
            report['checks']['trading_reframe_visible']=trading['reframe_visible'] and 'Direct trading guidance was removed.' in tr_all
            output_without_question=tr_all.replace(trading['question'] or '','').lower()
            prohibited=('you should buy','you should sell','entry price','stop-loss','guaranteed return','price target is')
            report['checks']['trading_no_actionable_instruction']=not any(term in output_without_question for term in prohibited)
            report['checks']['trading_boundary_present']='no trading signal' in tr_all.lower() and 'no price target' in tr_all.lower()

            future,fut_visible,fut_all,_=open_case('future_rejected','How does the selected date change temporal pressure?',tomorrow,viewport=(390,844),expect_success=False)
            report['checks']['future_rejected']=future['failure_visible'] and future['reading_zones']==0
            report['checks']['future_message']='on or before the current UTC date' in fut_all

            invalid,inv_visible,inv_all,_=open_case('invalid_short','BTC',expect_success=False)
            report['checks']['invalid_short_rejected']=invalid['failure_visible'] and invalid['reading_zones']==0
            report['checks']['invalid_short_message']='8–280 characters' in inv_all

            repeat_a,_,_,_=open_case('determinism_a',sample_question,screenshot=False)
            repeat_b,_,_,_=open_case('determinism_b',sample_question,screenshot=False)
            report['checks']['semantic_output_deterministic']=repeat_a['signature']==repeat_b['signature']

            severe=[entry for entry in driver.get_log('browser') if entry.get('level')=='SEVERE' and 'favicon' not in entry.get('message','').lower()]
            report['browser_severe']=severe
            report['checks']['browser_severe_none']=not severe
          finally:
            driver.quit()

          for path in Path('artifacts').glob('*.png'):
            report['artifacts'][path.name]=sha_file(path)
          report['failures']=[key for key,value in report['checks'].items() if value is not True]
          report['classification']='PASS' if not report['failures'] else 'FAIL'
          report['completed_at_utc']=datetime.now(timezone.utc).isoformat().replace('+00:00','Z')
          report_path=Path('artifacts/BTC_FIRST_CONTROLLED_PUBLIC_REQUEST_PILOT_REPORT.json')
          report_path.write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n')
          if report['failures']:
            raise SystemExit('Pilot failures: '+', '.join(report['failures']))
          PY
      - name: Upload controlled pilot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: btc-first-controlled-public-request-pilot
          path: artifacts/
          if-no-files-found: error
