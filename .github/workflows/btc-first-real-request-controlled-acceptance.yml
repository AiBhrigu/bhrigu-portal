name: BTC First Real Request Controlled Acceptance

on:
  pull_request:
    branches: [master]
    paths:
      - .github/workflows/btc-first-real-request-controlled-acceptance.yml

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install acceptance dependencies
        run: python3 -m pip install --disable-pip-version-check selenium==4.34.2 requests==2.32.4
      - name: Run controlled production acceptance
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import hashlib, json, math, re, statistics, time
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import urlencode, parse_qs, urlparse
          import requests
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait

          NODE='BTC_PERSONAL_FIELD_FIRST_REAL_REQUEST_CONTROLLED_ACCEPTANCE_SCOPE_v0_1'
          REQUEST_ID='BTC-REQ-0001-CONTROLLED'
          MASTER_SHA='b91827266ce57acae3954c2ec523119c81f2118e'
          BASE='https://www.bhrigu.io/crypto-astro/btc'
          PRODUCER='https://aibhrigu.github.io/phi-cosmography-open/crypto-astro/data/crypto_astro_snapshot.public.json'
          QUESTION='What changed in the BTC field since the previous accepted snapshot, why does it matter, what confirms or weakens it, and what should I watch next?'
          started=datetime.now(timezone.utc)
          report={
            'node':NODE,
            'request':{
              'request_id':REQUEST_ID,
              'classification':'CONTROLLED_PRODUCTION_ACCEPTANCE',
              'external_customer_request':False,
              'commercial_order':False,
              'question':QUESTION,
              'observation_date_mode':'CURRENT_UTC_DEFAULT',
              'public_surface':BASE,
            },
            'master_sha':MASTER_SHA,
            'started_at_utc':started.isoformat().replace('+00:00','Z'),
            'checks':{},'measurements':{},'accepted_output':{},'artifacts':{},
            'browser_severe':[],'failures':[]
          }

          def sha_file(path):
            data=Path(path).read_bytes()
            return {'sha256':hashlib.sha256(data).hexdigest(),'bytes':len(data)}

          def normalize(value):
            return re.sub(r'\s+',' ',value or '').strip()

          def texts(driver,selector):
            return [normalize(node.text) for node in driver.find_elements(By.CSS_SELECTOR,selector)]

          def collect_key(value,key,out=None):
            out=[] if out is None else out
            if isinstance(value,dict):
              for k,v in value.items():
                if k==key: out.append(v)
                collect_key(v,key,out)
            elif isinstance(value,list):
              for item in value: collect_key(item,key,out)
            return out

          def numeric_present(values,expected):
            for value in values:
              if isinstance(value,(int,float)) and not isinstance(value,bool):
                if math.isfinite(float(value)) and abs(float(value)-float(expected)) <= max(1e-8,abs(float(expected))*1e-10):
                  return True
            return False

          session=requests.Session()
          session.headers.update({'User-Agent':'BHRIGU-first-real-request-acceptance/0.1'})
          producer_response=session.get(PRODUCER,timeout=30)
          report['checks']['producer_http_200']=producer_response.status_code==200
          producer_response.raise_for_status()
          producer=producer_response.json()
          generated=producer['generated_at_utc']
          generated_dt=datetime.fromisoformat(generated.replace('Z','+00:00'))
          age_hours=(started-generated_dt).total_seconds()/3600
          report['measurements']['producer_generated_at_utc']=generated
          report['measurements']['producer_age_hours']=round(age_hours,3)
          report['measurements']['producer_freshness_status']=producer.get('freshness_status')
          report['checks']['producer_fresh']=producer.get('freshness_status')=='FRESH' and 0 <= age_hours <= 72

          http_latencies=[]
          for index in range(5):
            t0=time.perf_counter()
            response=session.get(BASE,params={'q':QUESTION,'acceptance':f'{REQUEST_ID}-{index}'},timeout=30)
            http_latencies.append(time.perf_counter()-t0)
            report['checks'][f'http_sample_{index+1}_200']=response.status_code==200
          report['measurements']['http_latency_seconds']=[round(v,3) for v in http_latencies]
          report['measurements']['http_latency_median_seconds']=round(statistics.median(http_latencies),3)
          report['measurements']['http_latency_max_seconds']=round(max(http_latencies),3)
          report['checks']['http_max_under_5s']=max(http_latencies)<5

          options=webdriver.ChromeOptions()
          for arg in ('--headless=new','--no-sandbox','--disable-dev-shm-usage','--hide-scrollbars'):
            options.add_argument(arg)
          options.set_capability('goog:loggingPrefs',{'browser':'ALL'})
          driver=webdriver.Chrome(options=options)

          def wait(selector,timeout=45):
            return WebDriverWait(driver,timeout).until(lambda d:d.find_element(By.CSS_SELECTOR,selector))

          def signature():
            return {
              'primary_modules':texts(driver,'.phiPlane .primaryModule h3'),
              'metric_cells':texts(driver,'.metricRibbon dl>div'),
              'executive_primary':texts(driver,'.executivePrimary'),
              'executive_context':texts(driver,'.executiveContext'),
              'memory_rows':texts(driver,'.memoryAxis tbody tr'),
              'evidence_summaries':texts(driver,'.evidenceStack>details>summary'),
            }

          try:
            driver.set_window_size(1440,1100)
            driver.get(BASE)
            wait('form textarea[name="q"]')
            report['checks']['root_has_no_read_before_question']=len(driver.find_elements(By.CSS_SELECTOR,'.reading'))==0

            textarea=driver.find_element(By.CSS_SELECTOR,'form textarea[name="q"]')
            textarea.clear(); textarea.send_keys(QUESTION)
            submit_started=time.perf_counter()
            driver.find_element(By.CSS_SELECTOR,'form button').click()
            WebDriverWait(driver,45).until(lambda d:'q=' in d.current_url and len(d.find_elements(By.CSS_SELECTOR,'.reading'))==1)
            time.sleep(.2)
            submit_elapsed=time.perf_counter()-submit_started
            report['measurements']['form_submit_to_read_seconds']=round(submit_elapsed,3)
            report['checks']['form_submit_under_8s']=submit_elapsed<8

            parsed=parse_qs(urlparse(driver.current_url).query)
            report['checks']['submitted_question_round_trip']=parsed.get('q',[None])[0]==QUESTION
            visible=driver.find_element(By.TAG_NAME,'body').text
            all_text=driver.execute_script('return document.body.textContent || ""')
            next_data=driver.execute_script("const n=document.getElementById('__NEXT_DATA__');return n?JSON.parse(n.textContent):null")
            primary=texts(driver,'.phiPlane .primaryModule h3')
            executive_title=normalize(driver.find_element(By.CSS_SELECTOR,'.executivePrimary h3').text)
            executive_lead=normalize(driver.find_element(By.CSS_SELECTOR,'.executiveLead').text)
            changed_items=texts(driver,'.executiveContext .contextBlock')
            watch_items=texts(driver,'.watchEvidence li')
            memory_rows=texts(driver,'.memoryAxis tbody tr')
            report['accepted_output']={
              'resolved_url':driver.current_url,
              'observation':normalize(driver.find_element(By.CSS_SELECTOR,'.observation b').text),
              'primary_modules':primary,
              'executive_title':executive_title,
              'executive_lead':executive_lead,
              'executive_context':changed_items,
              'memory_rows':memory_rows,
              'watch_items':watch_items,
              'reading_zones':len(driver.find_elements(By.CSS_SELECTOR,'.reading>.readingZone')),
              'modules':len(driver.find_elements(By.CSS_SELECTOR,'.phiPlane .phiModule')),
              'metric_cells':len(driver.find_elements(By.CSS_SELECTOR,'.metricRibbon dl>div')),
              'evidence_disclosures':len(driver.find_elements(By.CSS_SELECTOR,'.evidenceStack>details')),
              'history_rows':len(driver.find_elements(By.CSS_SELECTOR,'.historyTableWrap tbody tr')),
              'exact_memory_rows':len(driver.find_elements(By.CSS_SELECTOR,'.exactMemoryTableWrap tbody tr')),
              'source_links':len(driver.find_elements(By.CSS_SELECTOR,'.sourceProof a')),
            }
            driver.save_screenshot('artifacts/BTC-REQ-0001-controlled-acceptance-desktop.png')
            Path('artifacts/BTC-REQ-0001-controlled-acceptance.html').write_text(driver.page_source,encoding='utf-8')
            Path('artifacts/BTC-REQ-0001-visible-output.txt').write_text(visible+'\n',encoding='utf-8')

            report['checks']['complete_three_zone_read']=report['accepted_output']['reading_zones']==3
            report['checks']['five_module_contract']=report['accepted_output']['modules']==5
            report['checks']['exactly_two_primary_modules']=len(primary)==2
            report['checks']['expected_primary_route']=set(primary)=={'MARKET STRUCTURE','CHANGE / EVENT MEMORY'}
            report['checks']['six_current_metrics']=report['accepted_output']['metric_cells']==6
            report['checks']['eight_memory_rows']=len(memory_rows)==8
            report['checks']['three_evidence_disclosures']=report['accepted_output']['evidence_disclosures']==3
            report['checks']['two_verified_history_rows']=report['accepted_output']['history_rows']==2
            report['checks']['eight_exact_memory_rows']=report['accepted_output']['exact_memory_rows']==8
            report['checks']['source_proof_links_present']=report['accepted_output']['source_links']>=6

            required_labels=('What changed','What confirms it','What weakens it','Watch next','Uncertainty boundary')
            report['checks']['question_dimensions_answered']=all(label in all_text for label in required_labels)
            report['checks']['executive_state_present']=len(executive_title)>=4
            report['checks']['executive_lead_readable']=40<=len(executive_lead)<=600
            report['checks']['change_evidence_present']='BTC dominance' in all_text and 'Stablecoin share' in all_text
            report['checks']['watch_next_present']='Next accepted Snapshot Delta' in all_text
            report['checks']['uncertainty_present']='Uncertainty boundary' in all_text and 'Uncertainty' in all_text
            report['checks']['no_render_tokens']=not any(token in all_text for token in ('undefined','NaN','[object Object]'))

            output_without_question=all_text.replace(QUESTION,'').lower()
            prohibited=('you should buy','you should sell','entry price','stop-loss','guaranteed return','price target is')
            report['checks']['no_actionable_trading_instruction']=not any(term in output_without_question for term in prohibited)
            report['checks']['public_boundary_present']=all(term in output_without_question for term in ('no trading signal','no forecast','no price target','orion protected'))

            expected_values={
              'source_generated_at_utc':generated,
              'price_usd':producer['public_samples']['assets']['BTC']['price_usd'],
              'btc_dominance_pct':producer['market_reality']['btc_dominance_pct'],
              'defi_tvl_usd':producer['liquidity_tvl']['defi_tvl_usd'],
              'alt_breadth_24h_pct':producer['altcoin_rotation']['alt_breadth_24h_pct'],
              'market_field_score':producer['field_output']['market_field_score'],
            }
            report['checks']['binding_source_timestamp']=generated in collect_key(next_data,'source_generated_at_utc')
            for key in ('price_usd','btc_dominance_pct','defi_tvl_usd','alt_breadth_24h_pct','market_field_score'):
              report['checks'][f'binding_{key}']=numeric_present(collect_key(next_data,key),expected_values[key])
            for key in ('no_trading_signal','no_forecast','no_price_target'):
              report['checks'][f'boundary_{key}']=True in collect_key(next_data,key)

            first_signature=signature()
            accepted_url=driver.current_url
            driver.get(accepted_url+'&repeat=1')
            wait('.reading'); time.sleep(.15)
            second_signature=signature()
            report['checks']['semantic_output_deterministic']=first_signature==second_signature

            driver.set_window_size(390,844)
            driver.get(accepted_url+'&mobile=1')
            wait('.reading'); time.sleep(.15)
            horizontal_overflow=bool(driver.execute_script('return document.documentElement.scrollWidth>window.innerWidth+1'))
            report['checks']['mobile_no_horizontal_overflow']=not horizontal_overflow
            report['checks']['mobile_complete_read']=len(driver.find_elements(By.CSS_SELECTOR,'.reading>.readingZone'))==3
            driver.save_screenshot('artifacts/BTC-REQ-0001-controlled-acceptance-mobile.png')

            severe=[entry for entry in driver.get_log('browser') if entry.get('level')=='SEVERE' and 'favicon' not in entry.get('message','').lower()]
            report['browser_severe']=severe
            report['checks']['browser_severe_none']=not severe
          finally:
            driver.quit()

          for path in Path('artifacts').iterdir():
            if path.is_file(): report['artifacts'][path.name]=sha_file(path)
          report['failures']=[key for key,value in report['checks'].items() if value is not True]
          report['classification']='ACCEPTED' if not report['failures'] else 'REJECTED'
          report['completed_at_utc']=datetime.now(timezone.utc).isoformat().replace('+00:00','Z')
          Path('artifacts/BTC_FIRST_REAL_REQUEST_CONTROLLED_ACCEPTANCE_REPORT.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          if report['failures']:
            raise SystemExit('Acceptance failures: '+', '.join(report['failures']))
          PY
      - name: Upload controlled acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: btc-first-real-request-controlled-acceptance
          path: artifacts/
          if-no-files-found: error
