name: Trigger BTC Desktop Repair

on:
  pull_request:
    types: [opened, reopened]
    branches: [master]

permissions:
  contents: write

env:
  BRANCH: agent/btc-desktop-semantic-compression-v0-1

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/btc-desktop-semantic-compression-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/btc-desktop-semantic-compression-v0-1
          fetch-depth: 0
      - name: Execute locked presentation patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          workflow = Path('.github/workflows/btc-desktop-repair-apply.yml').read_text()
          start = workflow.index("          python3 - <<'PY'\n") + len("          python3 - <<'PY'\n")
          end = workflow.index("\n          PY\n", start)
          script = textwrap.dedent(workflow[start:end])
          script = script.replace("re.subn(pattern, formatter, text, count=1, flags=re.S)", "re.subn(pattern, lambda _: formatter, text, count=1, flags=re.S)")
          Path('/tmp/apply_btc_desktop.py').write_text(script)
          PY
          set +e
          python3 /tmp/apply_btc_desktop.py >/tmp/btc-desktop-apply.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cp /tmp/btc-desktop-apply.log BTC_DESKTOP_APPLY_ERROR.log
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add BTC_DESKTOP_APPLY_ERROR.log
            git commit -m "Capture BTC desktop repair failure"
            git push origin HEAD:${BRANCH}
            exit "$status"
          fi
          git rm .github/workflows/btc-desktop-repair-apply.yml
          git rm .github/workflows/btc-desktop-repair-pr-trigger.yml
          git rm -f BTC_DESKTOP_APPLY_ERROR.log || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pages/crypto-astro/btc.tsx
          git commit -m "Recompose BTC desktop Cosmographer reading surface"
          git push origin HEAD:${BRANCH}
