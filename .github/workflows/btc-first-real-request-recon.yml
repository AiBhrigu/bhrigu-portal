name: BTC First Real Request Recon

on:
  push:
    branches:
      - agent/btc-first-real-request-readiness-recon-v0-1
    paths:
      - .github/workflows/btc-first-real-request-recon.yml

permissions:
  contents: write

jobs:
  recon:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install browser and report dependencies
        run: python3 -m pip install --disable-pip-version-check selenium==4.34.2 requests==2.32.4
      - name: Run public request readiness matrix
        run: |
          mkdir -p artifacts
          python3 - <<'PY'
          import hashlib, json, statistics, time, traceback
          from pathlib import Path
          from urllib.parse import urlencode
          import requests
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait

          base='https://www.bhrigu.io/crypto-astro/btc'
          source_snapshot='https://aibhrigu.github.io/phi-cosmography-open/crypto-astro/data/crypto_astro_snapshot.public.json'
          report={
            'node':'BTC_PERSONAL_FIELD_FIRST_REAL_REQUEST_READINESS_RECON_SCOPE_v0_1',
            'master_sha':'f2b50701eff61bd4e80be9355b6012ee6e24ee2e',
            'checks':{},'measurements':{},'scenarios':[], 'risks':[], 'failures':[], 'artifacts':{}
          }
          headers={'User-Agent':'Mozilla/5.0 BTC-First-Request-Recon/1.0','Cache-Control':'no-cache','Pragma':'no-cache'}
          driver=None

          def url(q=None,d=None,nonce=None):
            params={}
            if q is not None: params['q']=q
            if d is not None: params['d']=d
            if nonce is not None: params['recon']=nonce
            return base+('?' + urlencode(params) if params else '')

          def wait_for(selector, timeout=50):
            return WebDriverWait(driver,timeout).until(lambda x:x.find_element(By.CSS_SELECTOR,selector))

          def browser_case(name,q,d=None,expected_primary=None,expect_read=True,expect_reframe=False,expect_failure=False):
            started=time.perf_counter()
            driver.get(url(q,d,name))
            wait_for('#btc-question-title')
            elapsed=time.perf_counter()-started
            body=driver.find_element(By.TAG_NAME,'body').text
            reading=driver.find_elements(By.CSS_SELECTOR,'.reading>.readingZone')
            failure=driver.find_elements(By.CSS_SELECTOR,'.failure[role="alert"]')
            primaries=[e.text.strip() for e in driver.find_elements(By.CSS_SELECTOR,'.primaryModule h3')]
            scenario={
              'name':name,'question':q,'date':d,'elapsed_seconds':round(elapsed,3),
              'reading_zones':len(reading),'primary_modules':primaries,
              'reframe_visible':bool(driver.find_elements(By.CSS_SELECTOR,'.reframe')),
              'failure_visible':bool(failure),
              'body_excerpt':body[:500]
            }
            report['scenarios'].append(scenario)
            report['checks'][f'{name}_http_rendered']=True
            if expect_read:
              report['checks'][f'{name}_complete_read']=len(reading)==3 and len(driver.find_elements(By.CSS_SELECTOR,'.phiPlane .phiModule'))==5 and len(primaries)==2
            if expected_primary is not None:
              report['checks'][f'{name}_primary_route']=primaries==expected_primary
            if expect_reframe:
              report['checks'][f'{name}_safe_reframe']=scenario['reframe_visible'] and 'Direct trading guidance was removed' in body
            if expect_failure:
              report['checks'][f'{name}_distinct_failure']=scenario['failure_visible'] and 'Adjust the question or date' in body
            return body, scenario

          try:
            source=requests.get(source_snapshot,headers=headers,timeout=30)
            report['checks']['producer_snapshot_http_200']=source.status_code==200
            snapshot=source.json() if source.status_code==200 else {}
            generated=snapshot.get('generated_at_utc')
            report['measurements']['producer_generated_at_utc']=generated
            report['measurements']['producer_freshness_status']=snapshot.get('freshness_status')
            if generated:
              age_hours=max(0,(time.time()-time.mktime(time.strptime(generated,'%Y-%m-%dT%H:%M:%SZ')))/3600)
              report['measurements']['producer_age_hours_approx']=round(age_hours,3)
              report['checks']['producer_within_72h']=age_hours<=72

            latencies=[]
            for i in range(5):
              started=time.perf_counter()
              response=requests.get(url('What changed in the BTC field and why does it matter?',nonce=f'latency-{i}'),headers=headers,timeout=45)
              latencies.append(time.perf_counter()-started)
              report['checks'][f'http_sample_{i+1}_200']=response.status_code==200
              if i==0:
                Path('artifacts/public-query.html').write_text(response.text)
                report['checks']['ssr_contains_new_shell']='Market Cosmographer · BTC corridor' in response.text and 'Five-module' in response.text
                report['checks']['ssr_contains_source_timestamp']=generated in response.text if generated else False
            report['measurements']['http_latency_seconds']=[round(x,3) for x in latencies]
            report['measurements']['http_latency_median_seconds']=round(statistics.median(latencies),3)
            report['measurements']['http_latency_max_seconds']=round(max(latencies),3)
            report['checks']['http_latency_max_under_8s']=max(latencies)<8

            options=webdriver.ChromeOptions()
            for arg in ('--headless=new','--no-sandbox','--disable-dev-shm-usage','--hide-scrollbars'):
              options.add_argument(arg)
            options.set_capability('goog:loggingPrefs', {'browser':'ALL'})
            driver=webdriver.Chrome(options=options)
            driver.set_window_size(1440,1000)

            driver.get(url(nonce='root'))
            wait_for('#btc-question-title')
            root_body=driver.find_element(By.TAG_NAME,'body').text
            report['checks']['root_no_read_before_question']=len(driver.find_elements(By.CSS_SELECTOR,'.reading'))==0
            report['checks']['root_form_ready']=len(driver.find_elements(By.CSS_SELECTOR,'form textarea[name="q"]'))==1 and len(driver.find_elements(By.CSS_SELECTOR,'form button'))==1
            report['checks']['root_brand_shell']='Market Cosmographer · BTC corridor' in root_body and 'BTC Field Read' in root_body
            driver.save_screenshot('artifacts/root-desktop.png')

            general_body,general=browser_case('general','What changed in the BTC field and why does it matter?',expected_primary=['CHANGE / EVENT MEMORY','MARKET STRUCTURE'])
            report['checks']['general_eight_memory_rows']=len(driver.find_elements(By.CSS_SELECTOR,'.memoryAxis tbody tr'))==8
            report['checks']['general_three_evidence_disclosures']=len(driver.find_elements(By.CSS_SELECTOR,'.evidenceStack>details'))==3
            report['checks']['general_source_proof_links']=len(driver.find_elements(By.CSS_SELECTOR,'.sourceProof a'))>=10
            report['checks']['general_public_boundary']='no trading signal' in general_body.lower() and 'no forecast' in general_body.lower()
            driver.save_screenshot('artifacts/general-read-desktop.png')

            browser_case('dominance','What does BTC dominance mean for the wider market?',expected_primary=['MARKET STRUCTURE','CHANGE / EVENT MEMORY'])
            browser_case('liquidity','What do liquidity, stablecoins, DEX volume and DeFi TVL show now?',expected_primary=['LIQUIDITY MEMBRANE','MARKET STRUCTURE'])
            browser_case('rotation','What do breadth, altcoin rotation and ETH participation show?',expected_primary=['MARKET STRUCTURE','CHANGE / EVENT MEMORY'])
            browser_case('memory','What changed since the previous accepted snapshot?',expected_primary=['CHANGE / EVENT MEMORY','MARKET STRUCTURE'])
            browser_case('temporal','How does the selected date change temporal pressure?',d='2026-07-23',expected_primary=['TEMPORAL CONTEXT','CHANGE / EVENT MEMORY'])
            trading_body,_=browser_case('trading_reframe','Should I buy or sell BTC right now?',expect_reframe=True,expected_primary=['MARKET STRUCTURE','CHANGE / EVENT MEMORY'])
            report['checks']['trading_reframe_no_action_instruction']=all(token not in trading_body.lower() for token in ['buy now','sell now','entry price','exit price','use leverage'])
            browser_case('russian','Что изменилось в поле BTC и почему это важно?',expected_primary=['MARKET STRUCTURE','CHANGE / EVENT MEMORY'])
            browser_case('invalid_short','short',expect_read=False,expect_failure=True)
            browser_case('invalid_date','What changed in the BTC field and why does it matter?',d='2026-02-30',expect_read=False,expect_failure=True)
            long_q='BTC '+('x'*280)
            browser_case('invalid_long',long_q,expect_read=False,expect_failure=True)

            first_text,_=browser_case('determinism_a','What does liquidity and breadth show now?')
            second_text,_=browser_case('determinism_b','What does liquidity and breadth show now?')
            report['checks']['visible_output_deterministic']=first_text==second_text

            future_body,future=browser_case('future_date','How does the selected date change temporal pressure?',d='2030-01-01',expected_primary=['TEMPORAL CONTEXT','CHANGE / EVENT MEMORY'])
            future_complete=future['reading_zones']==3 and not future['failure_visible']
            report['measurements']['future_date_complete_read']=future_complete
            report['measurements']['future_date_displays_observation']='January 1, 2030' in future_body
            if future_complete:
              report['risks'].append({
                'id':'FUTURE_OBSERVATION_DATE_ACCEPTED',
                'severity':'HIGH',
                'finding':'A future date produces a complete temporal-pressure read while the product states no forecast and labels the date as an observation.',
                'evidence_date':'2030-01-01'
              })
            driver.save_screenshot('artifacts/future-date-read.png')

            severe=[entry for entry in driver.get_log('browser') if entry.get('level')=='SEVERE' and 'favicon' not in entry.get('message','').lower()]
            report['checks']['browser_severe_none']=not severe
            report['browser_severe']=severe

          except Exception as exc:
            report['checks']['recon_execution']=False
            report['exception']=repr(exc)
            report['traceback']=traceback.format_exc()
          finally:
            if driver is not None:
              driver.quit()

          critical=[key for key,value in report['checks'].items() if not value]
          report['failures']=critical
          report['readiness_classification']='READY_WITH_BLOCKER' if any(r['severity']=='HIGH' for r in report['risks']) else ('PASS' if not critical else 'FAIL')
          for path in sorted(Path('artifacts').glob('*')):
            if path.is_file():
              report['artifacts'][path.name]={'sha256':hashlib.sha256(path.read_bytes()).hexdigest(),'bytes':path.stat().st_size}
          Path('artifacts/btc-first-real-request-recon-report.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n')
          print(json.dumps({'classification':report['readiness_classification'],'failures':report['failures'],'risks':report['risks'],'measurements':report['measurements']},ensure_ascii=False,indent=2))
          assert not critical, critical
          PY
      - name: Upload recon evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: btc-first-real-request-readiness-recon
          path: artifacts/
          if-no-files-found: error
      - name: Publish compact recon report
        if: always()
        run: |
          if [ ! -f artifacts/btc-first-real-request-recon-report.json ]; then
            printf '{"checks":{"report_created":false},"failures":["report_created"],"readiness_classification":"FAIL"}\n' > artifacts/btc-first-real-request-recon-report.json
          fi
          cp artifacts/btc-first-real-request-recon-report.json BTC_FIRST_REAL_REQUEST_READINESS_RECON_REPORT.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add BTC_FIRST_REAL_REQUEST_READINESS_RECON_REPORT.json
          git commit -m "Record BTC first-request readiness recon" || exit 0
          git push origin HEAD:agent/btc-first-real-request-readiness-recon-v0-1
