name: Repair BTC Desktop Visual Scope

on:
  pull_request:
    types: [reopened]
    branches: [master]

permissions:
  contents: write

env:
  BRANCH: agent/btc-desktop-semantic-compression-v0-1

jobs:
  repair:
    if: github.event.pull_request.head.ref == 'agent/btc-desktop-semantic-compression-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/btc-desktop-semantic-compression-v0-1
          fetch-depth: 0
      - name: Globalize semantic styles and humanize visible evidence
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('pages/crypto-astro/btc.tsx')
          text=path.read_text()
          replacements=[
            ('function ExecutiveRead({e}:{e:BtcMarketEnvelope}){const changed=e.synthesis.what_changed.slice(0,2);const confirms=e.synthesis.confirming_modules.slice(0,2);const weakens=e.synthesis.contradicting_or_weakening_modules.slice(0,2);return',
             'function ExecutiveRead({e}:{e:BtcMarketEnvelope}){const changed=e.memory.metrics.filter(metric=>metric.direction!=="UNCHANGED").slice(0,2).map(metric=>`${memoryLabel(metric.metric_id)}: ${memoryValue(metric,metric.previous_value)} → ${memoryValue(metric,metric.current_value)} (${memoryDelta(metric)})`);const confirms=e.synthesis.confirming_modules.slice(0,2).map(item=>item.split(":")[0]);const weakens=e.synthesis.contradicting_or_weakening_modules.slice(0,2).map(item=>item.split(":")[0]);return'),
            ('<p>{confirms[0]??"No multi-module confirmation is asserted."}</p>',
             '<p>{confirms[0]?`${confirms[0]} aligns with the routed structure.`:"No multi-module confirmation is asserted."}</p>'),
            ('<p>{weakens[0]??"No contradiction is asserted."}</p>',
             '<p>{weakens[0]??"No contradiction is asserted."}</p>'),
            ('function ModuleCard({node,primary=false}:{node:BtcMarketEnvelope["phi_geometry"]["nodes"][number];primary?:boolean}){return',
             'const moduleSummary=(e:BtcMarketEnvelope,id:string)=>id==="market_structure"?`Field ${compact(e.current.market_field_score,1)} · dominance ${pct(e.current.btc_dominance_pct,2,false)} · ${e.current.regime}`:id==="liquidity_membrane"?`DeFi TVL ${money(e.current.defi_tvl_usd)} · DEX 24h ${money(e.current.dex_volume_24h_usd)} · stable share ${pct(e.current.stablecoin_share_pct,2,false)}`:id==="change_event_memory"?`${e.memory.comparable_metric_count} comparable metrics · ${stateLabel(e.synthesis.state)}`:id==="temporal_context"?`${plain(e.current.bounded_temporal_context.state)} · tension ${e.current.bounded_temporal_context.harmonic_tension===null?"unavailable":compact(e.current.bounded_temporal_context.harmonic_tension,2)}`:`${stateLabel(e.synthesis.state)} · ${e.synthesis.why_this_matters}`;\nfunction ModuleCard({e,node,primary=false}:{e:BtcMarketEnvelope;node:BtcMarketEnvelope["phi_geometry"]["nodes"][number];primary?:boolean}){return'),
            ('<p>{node.evidence[0]??"Evidence is not available for this module."}</p>',
             '<p>{moduleSummary(e,node.id)}</p>'),
            ('<ModuleCard node={primary[0]} primary/>', '<ModuleCard e={e} node={primary[0]} primary/>'),
            ('<ModuleCard node={primary[1]} primary/>', '<ModuleCard e={e} node={primary[1]} primary/>'),
            ('<ModuleCard key={node.id} node={node}/>', '<ModuleCard key={node.id} e={e} node={node}/>'),
            ('61.803% primary attention · 38.197% supporting context · Φ {e.phi_geometry.phi_constant}',
             '61.8% primary attention · 38.2% supporting context · Φ 1.618'),
            ('</main><style jsx>{`', '</main><style jsx global>{`'),
          ]
          for old,new in replacements:
            count=text.count(old)
            if count!=1:
              raise SystemExit(f'anchor count={count}: {old[:90]}')
            text=text.replace(old,new)
          path.write_text(text)
          PY
          git rm .github/workflows/btc-desktop-visual-scope-repair.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pages/crypto-astro/btc.tsx
          git commit -m "Apply BTC semantic module styles and human evidence labels"
          git push origin HEAD:${BRANCH}
