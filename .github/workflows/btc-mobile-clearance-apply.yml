name: Apply BTC Mobile Clearance Repair

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.ref == 'agent/btc-mobile-scroll-offset-overlay-clearance-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/btc-mobile-scroll-offset-overlay-clearance-v0-1
          fetch-depth: 0
      - name: Apply mobile scroll offset and target clearance
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path=Path('pages/crypto-astro/btc.tsx')
          text=path.read_text()
          marker='BTC_MOBILE_SCROLL_CLEARANCE_V0_1'
          if marker in text:
            print('mobile clearance already applied')
            raise SystemExit(0)

          old=':global(html){scroll-padding-bottom:calc(clamp(128px,12vh,168px) + env(safe-area-inset-bottom))}'
          new=':global(html){scroll-padding-top:calc(84px + env(safe-area-inset-top));scroll-padding-bottom:calc(clamp(128px,12vh,168px) + env(safe-area-inset-bottom))}'
          if text.count(old)!=1:
            raise SystemExit(f'expected one html scroll-padding rule, found {text.count(old)}')
          text=text.replace(old,new)

          media='''        @media(max-width:800px){\n          main{padding-inline:12px}'''
          repair='''        @media(max-width:800px){\n          /* BTC_MOBILE_SCROLL_CLEARANCE_V0_1 */\n          :global(html){scroll-padding-top:calc(76px + env(safe-area-inset-top));}\n          .questionPanel,.readingZone,.readingZone [id],.phiModule,.btcAxis,.memoryAxis,.evidenceStack>details{scroll-margin-top:calc(76px + env(safe-area-inset-top));scroll-margin-bottom:calc(96px + env(safe-area-inset-bottom));}\n          main{padding-inline:12px}'''
          if text.count(media)!=1:
            raise SystemExit(f'expected one mobile media insertion point, found {text.count(media)}')
          text=text.replace(media,repair)
          path.write_text(text)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pages/crypto-astro/btc.tsx
          git commit -m "Repair BTC mobile scroll clearance" || exit 0
          git push origin HEAD:agent/btc-mobile-scroll-offset-overlay-clearance-v0-1
