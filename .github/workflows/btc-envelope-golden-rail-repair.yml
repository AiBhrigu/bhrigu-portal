name: BTC Envelope Golden Rail Repair

on:
  push:
    branches:
      - agent/btc-personal-field-market-envelope-v0-1
    paths:
      - .github/workflows/btc-envelope-golden-rail-repair.yml

permissions:
  contents: write

env:
  BRANCH: agent/btc-personal-field-market-envelope-v0-1

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/btc-personal-field-market-envelope-v0-1
          fetch-depth: 0
      - name: Lock 61.8 percent BTC anchor and 38.2 percent module rail
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('pages/crypto-astro/btc.tsx')
          text = path.read_text()
          replacements = {
            '.btc{min-height:220px;display:grid;place-content:center;text-align:center;': '.btc{align-self:start;min-height:360px;display:grid;place-content:center;text-align:center;',
            '.nodes{display:grid;grid-template-columns:1fr 1fr;gap:8px}': '.nodes{display:grid;grid-template-columns:1fr;gap:8px}',
            '.btc{min-height:170px}.envelope{padding:18px 13px}.nodes{grid-template-columns:1fr 1fr}': '.btc{min-height:170px}.envelope{padding:18px 13px}.nodes{grid-template-columns:1fr}',
          }
          for old,new in replacements.items():
            count=text.count(old)
            if count != 1:
              raise SystemExit(f'exact replacement count for {old!r}: {count}')
            text=text.replace(old,new)
          path.write_text(text)
          PY
          git rm .github/workflows/btc-envelope-golden-rail-repair.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pages/crypto-astro/btc.tsx
          git commit -m "Lock BTC golden anchor and module rail geometry"
          git push origin HEAD:${BRANCH}
