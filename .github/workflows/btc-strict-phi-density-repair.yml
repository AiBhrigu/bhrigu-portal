name: Repair BTC Strict Phi Zone One Density

on:
  pull_request:
    types: [reopened]
    branches: [master]

permissions:
  contents: write

env:
  BRANCH: agent/btc-desktop-semantic-compression-v0-1

jobs:
  repair:
    if: github.event.pull_request.head.ref == 'agent/btc-desktop-semantic-compression-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/btc-desktop-semantic-compression-v0-1
          fetch-depth: 0
      - name: Compress zone one vertical rhythm
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('pages/crypto-astro/btc.tsx')
          text=path.read_text()
          replacements={
            '.readingZone{padding:clamp(30px,5vw,64px) 0;':'.readingZone{padding:28px 0;',
            '.readingHeader h2{margin:7px 0 0;font-size:clamp(28px,4vw,48px);letter-spacing:-.035em;line-height:1.06}':'.readingHeader h2{margin:5px 0 0;font-size:clamp(28px,3.4vw,40px);letter-spacing:-.035em;line-height:1.02}',
            '.readingHeader dl div{display:grid;grid-template-columns:92px 1fr;gap:12px;padding:9px 0;':'.readingHeader dl div{display:grid;grid-template-columns:92px 1fr;gap:12px;padding:7px 0;',
            '.metricRibbon{margin-top:28px;':'.metricRibbon{margin-top:20px;',
            'padding:14px 0;border-bottom:1px solid #ffffff12}':'padding:10px 0;border-bottom:1px solid #ffffff12}',
            '.metricRibbon>dl>div{min-width:0;padding:15px 12px;':'.metricRibbon>dl>div{min-width:0;padding:10px 12px;',
            '.metricRibbon dd{margin:5px 0 3px;font-size:clamp(18px,2vw,25px);':'.metricRibbon dd{margin:4px 0 2px;font-size:clamp(18px,1.7vw,22px);',
            'gap:clamp(28px,4vw,56px);margin-top:34px}':'gap:clamp(24px,3vw,40px);margin-top:22px}',
            '.executivePrimary h3{margin:8px 0 12px;font-size:clamp(34px,5vw,64px);letter-spacing:-.05em;line-height:.98;':'.executivePrimary h3{margin:6px 0 8px;font-size:clamp(34px,4vw,50px);letter-spacing:-.05em;line-height:1;',
            '.executiveLead{max-width:760px;margin:0;color:#c4d0da;font-size:clamp(16px,1.8vw,21px);line-height:1.5}':'.executiveLead{max-width:760px;margin:0;color:#c4d0da;font-size:clamp(16px,1.5vw,18px);line-height:1.4}',
            '.executivePrimary dl{margin:28px 0 0;display:grid;grid-template-columns:1fr 1fr;gap:24px}':'.executivePrimary dl{margin:18px 0 0;display:grid;grid-template-columns:1fr 1fr;gap:18px}',
            '.executivePrimary dd,.executiveContext dd{margin:7px 0 0;color:#c1ccd6;line-height:1.5}':'.executivePrimary dd,.executiveContext dd{margin:5px 0 0;color:#c1ccd6;line-height:1.4}',
            '.executiveContext dl div{padding:12px 0;':'.executiveContext dl div{padding:8px 0;',
          }
          for old,new in replacements.items():
            if old not in text: raise SystemExit(f'missing locked fragment: {old}')
            text=text.replace(old,new,1)
          path.write_text(text)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pages/crypto-astro/btc.tsx
          git commit -m "Compress strict Phi executive reading rhythm"
          git push origin HEAD:${BRANCH}
