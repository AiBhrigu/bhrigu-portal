name: Tune BTC Mobile Clearance

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [master]

permissions:
  contents: write

jobs:
  tune:
    if: github.event.pull_request.head.ref == 'agent/btc-mobile-scroll-offset-overlay-clearance-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/btc-mobile-scroll-offset-overlay-clearance-v0-1
          fetch-depth: 0
      - name: Tune measured mobile header clearance
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('pages/crypto-astro/btc.tsx')
          text=path.read_text()
          old_top=':global(html){scroll-padding-top:calc(76px + env(safe-area-inset-top));}'
          new_top=':global(html){scroll-padding-top:calc(108px + env(safe-area-inset-top));}'
          old_targets='.questionPanel,.readingZone,.readingZone [id],.phiModule,.btcAxis,.memoryAxis,.evidenceStack>details{scroll-margin-top:calc(76px + env(safe-area-inset-top));scroll-margin-bottom:calc(96px + env(safe-area-inset-bottom));}'
          new_targets='.questionPanel,.questionPanel [id],.readingZone,.readingZone [id],.phiModule,.btcAxis,.memoryAxis,.evidenceStack>details{scroll-margin-top:calc(108px + env(safe-area-inset-top));scroll-margin-bottom:calc(96px + env(safe-area-inset-bottom));}'
          if new_top in text and new_targets in text:
            print('measured mobile clearance already tuned')
            raise SystemExit(0)
          if text.count(old_top)!=1 or text.count(old_targets)!=1:
            raise SystemExit('expected mobile clearance rules were not found exactly once')
          path.write_text(text.replace(old_top,new_top).replace(old_targets,new_targets))
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pages/crypto-astro/btc.tsx
          git commit -m "Tune BTC mobile header clearance" || exit 0
          git push origin HEAD:agent/btc-mobile-scroll-offset-overlay-clearance-v0-1
