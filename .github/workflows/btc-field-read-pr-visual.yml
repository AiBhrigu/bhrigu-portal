name: BTC Field Read PR Visual
# DEPLOYMENT_QUOTA_RELEASE_RETRIGGER_V0_1

on:
  pull_request:
    paths:
      - "pages/crypto-astro/btc.tsx"
      - "components/btc/**"
      - "lib/btc-public-language-contract.ts"
      - "lib/btc-public-question-bridge.ts"
      - "lib/btc-existing-glyph-canon.ts"
      - "lib/btc-bilingual-surface-style.ts"
      - "lib/btc-public-surface-format.ts"
      - "lib/btc-public-static-source.ts"
      - "lib/btc-public-snapshot-composer.ts"
      - "lib/btc-question-geometry.ts"
      - "lib/btc-market-envelope.ts"
      - "lib/btc-narrative-template-catalog.ts"
      - "lib/btc-public-display-labels.ts"
      - "tests/btc-*.ts"
      - "scripts/run-btc-routing-fixture.mjs"
      - "scripts/verify-btc-bilingual-surface.py"
      - "tsconfig.btc-routing-fixture.json"
      - ".github/workflows/btc-field-read-pr-visual.yml"

permissions:
  contents: read

jobs:
  btc-field-read:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Verify deterministic BTC routing contracts
        run: |
          mkdir -p artifacts
          set +e
          npm run verify:btc-routing > artifacts/routing.log 2>&1
          code=$?
          cat artifacts/routing.log
          exit "$code"
      - name: Build production surface
        run: |
          set +e
          npm run build > artifacts/build.log 2>&1
          code=$?
          cat artifacts/build.log
          exit "$code"
      - name: Install browser driver
        run: python3 -m pip install --disable-pip-version-check selenium==4.34.2
      - name: Start production preview
        run: |
          npm run start -- -p 3000 >/tmp/btc-field-read.log 2>&1 &
          for attempt in {1..40}; do
            curl --fail --silent http://127.0.0.1:3000/crypto-astro/btc >/dev/null && exit 0
            sleep 1
          done
          cp /tmp/btc-field-read.log artifacts/preview.log
          cat /tmp/btc-field-read.log
          exit 1
      - name: Verify bilingual membrane, native glyph binding, Φ geometry and mobile clearance
        run: python3 scripts/verify-btc-bilingual-surface.py
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: btc-bilingual-glyph-pr-${{ github.event.pull_request.number }}
          path: artifacts/
          if-no-files-found: error
