name: Apply BTC Strict Phi Visual Canon

on:
  pull_request:
    types: [reopened]
    branches: [master]

permissions:
  contents: write

env:
  BRANCH: agent/btc-desktop-semantic-compression-v0-1

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/btc-desktop-semantic-compression-v0-1'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/btc-desktop-semantic-compression-v0-1
          fetch-depth: 0
      - name: Apply locked three-zone Phi composition
        run: |
          python3 - <<'PY'
          import base64, gzip
          from pathlib import Path
          root=Path('.github/btc-strict-phi')
          page=''.join(path.read_text().strip() for path in sorted(root.glob('page-*.txt')))
          visual=''.join(path.read_text().strip() for path in sorted(root.glob('visual-*.txt')))
          Path('pages/crypto-astro/btc.tsx').write_bytes(gzip.decompress(base64.b64decode(page)))
          Path('.github/workflows/btc-field-read-pr-visual.yml').write_bytes(gzip.decompress(base64.b64decode(visual)))
          PY
          git rm -r .github/btc-strict-phi
          git rm .github/workflows/btc-strict-phi-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pages/crypto-astro/btc.tsx .github/workflows/btc-field-read-pr-visual.yml
          git commit -m "Recompose BTC field to strict three-zone Phi canon"
          git push origin HEAD:${BRANCH}
