<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">ORION Private Structural Reading access clarity infographic</title>
  <desc id="desc">What to send, what happens next, what you receive, and what this is not.</desc>
  <!-- ACCESS_CLARITY_INFOGRAPHIC_V0_1 -->
  <defs>
    <radialGradient id="g1" cx="50%" cy="-8%" r="95%">
      <stop offset="0%" stop-color="#283762"/>
      <stop offset="44%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4d58c"/>
      <stop offset="100%" stop-color="#9f7440"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <style>
      .bg{fill:url(#g1)}
      .line{stroke:#f4d58c;stroke-opacity:.16;stroke-width:1;fill:none}
      .phi{stroke:#f4d58c;stroke-opacity:.34;stroke-width:2;fill:none}
      .card{fill:#0b1020;fill-opacity:.78;stroke:#f4d58c;stroke-opacity:.24;stroke-width:1.2;rx:28;filter:url(#soft)}
      .num{fill:url(#gold);font:700 24px ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial;letter-spacing:.08em}
      .kicker{fill:#b7c2df;font:600 15px ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial;letter-spacing:.16em;text-transform:uppercase}
      .title{fill:#f8ead0;font:700 30px ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial;letter-spacing:.01em}
      .item{fill:#eef3ff;font:500 25px ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial}
      .muted{fill:#9faad0;font:500 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial;letter-spacing:.02em}
      .head{fill:#fff7e6;font:750 40px ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial;letter-spacing:.01em}
      .sub{fill:#aeb8d6;font:500 21px ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial}
      .dot{fill:#f4d58c;opacity:.82}
      .x{fill:#ffcfb8;font:700 24px ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial}
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <circle class="line" cx="600" cy="374" r="310"/>
  <circle class="line" cx="600" cy="374" r="191"/>
  <path class="phi" d="M450 548c-82-84-79-216 5-297 82-80 214-77 293 5 77 80 75 209-5 286-78 75-204 73-279-4-72-74-70-193 4-264"/>
  <path class="line" d="M140 162h920M140 598h920M600 94v572"/>

  <text x="82" y="74" class="kicker">ORION · PRIVATE STRUCTURAL READING</text>
  <text x="82" y="123" class="head">Access clarity</text>
  <text x="82" y="158" class="sub">One date. One context. One bounded manual reading.</text>

  <g transform="translate(70 210)">
    <rect class="card" width="500" height="210"/>
    <text x="34" y="46" class="num">01</text>
    <text x="94" y="46" class="title">What to send</text>
    <circle class="dot" cx="42" cy="92" r="5"/><text x="64" y="101" class="item">Selected date</text>
    <circle class="dot" cx="42" cy="132" r="5"/><text x="64" y="141" class="item">Short context</text>
    <circle class="dot" cx="42" cy="172" r="5"/><text x="64" y="181" class="item">One main question</text>
  </g>

  <g transform="translate(630 210)">
    <rect class="card" width="500" height="210"/>
    <text x="34" y="46" class="num">02</text>
    <text x="94" y="46" class="title">What happens next</text>
    <circle class="dot" cx="42" cy="92" r="5"/><text x="64" y="101" class="item">Review</text>
    <circle class="dot" cx="42" cy="132" r="5"/><text x="64" y="141" class="item">Private structural reading</text>
    <circle class="dot" cx="42" cy="172" r="5"/><text x="64" y="181" class="item">One clarification follow-up</text>
  </g>

  <g transform="translate(70 465)">
    <rect class="card" width="500" height="210"/>
    <text x="34" y="46" class="num">03</text>
    <text x="94" y="46" class="title">What you receive</text>
    <circle class="dot" cx="42" cy="92" r="5"/><text x="64" y="101" class="item">One concise private reading</text>
    <circle class="dot" cx="42" cy="132" r="5"/><text x="64" y="141" class="item">One follow-up clarification</text>
    <circle class="dot" cx="42" cy="172" r="5"/><text x="64" y="181" class="item">Manual, bounded response</text>
  </g>

  <g transform="translate(630 465)">
    <rect class="card" width="500" height="210"/>
    <text x="34" y="46" class="num">04</text>
    <text x="94" y="46" class="title">What this is not</text>
    <text x="41" y="101" class="x">×</text><text x="75" y="101" class="item">Not a chatbot</text>
    <text x="41" y="141" class="x">×</text><text x="75" y="141" class="item">Not a subscription</text>
    <text x="41" y="181" class="x">×</text><text x="75" y="181" class="item">Not financial / medical / legal advice</text>
    <text x="75" y="213" class="muted">Not deterministic prediction</text>
  </g>
</svg>
